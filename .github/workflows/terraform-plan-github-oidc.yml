name: terraform-github-oidc

on:
  pull_request:
    paths:
      - "terraform/github-oidc/**"
  push:
    branches:
      - main
    paths:
      - "terraform/github-oidc/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_DIR: terraform/github-oidc
  TF_VAR_aws_profile: ""

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::721665305066:role/github-actions-aws-q-academy
          aws-region: eu-west-3

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -no-color -backend-config="profile=" -reconfigure

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Find existing plan comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v3
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- tf-plan-github-oidc -->"

      - name: Create or update plan comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- tf-plan-github-oidc -->
            ## Terraform Plan — `github-oidc`

            <details><summary>Show plan</summary>

            ```
            ${{ steps.plan.outputs.stdout }}
            ```

            </details>

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -no-color -auto-approve tfplan
