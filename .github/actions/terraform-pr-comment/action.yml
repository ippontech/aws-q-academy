name: terraform-pr-comment
description: Post or update a Terraform plan as a PR comment

inputs:
  plan_file:
    description: "Path to the terraform plan output file"
    required: false
    default: /tmp/plan.txt
  title:
    description: "Comment title to identify the plan (e.g. module name)"
    required: false
    default: Terraform Plan

runs:
  using: composite
  steps:
    - uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const plan = fs.readFileSync('${{ inputs.plan_file }}', 'utf8');
          const title = '### ${{ inputs.title }}';
          const body = `${title}\n\`\`\`hcl\n${plan}\n\`\`\``;
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.startsWith(title));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
